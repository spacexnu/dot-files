"$schema" = "https://starship.rs/config-schema.json"

format = """
[ΌΓ╢](fg:bg0)\
$os\
$username\
[ΌΓ░](fg:bg0 bg:blue)\
$directory\
[ΌΓ░](fg:blue bg:cyan)\
$git_branch\
$git_status\
[ΌΓ░](fg:cyan bg:green)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[ΌΓ░](fg:green bg:magenta)\
$docker_context\
[ΌΓ░](fg:magenta bg:comment)\
$time\
[ΌΓ┤ ](fg:comment)\
$line_break$character"""

palette = "solarized_light"

