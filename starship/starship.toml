[docker_context]
symbol = "ΎΝΙ"
style = "bg:magenta"
format = "[[ $symbol( $context) ](bg:magenta fg:bg0)]($style)"

[time]
disabled = false
time_format = "%R"
style = "bg:comment"
format = "[[ ΎΡ║ $time ](bg:comment fg:fg)]($style)"

[line_break]
disabled = false

[character]
disabled = false
success_symbol = "[ΎΡ▓](bold fg:green)"
error_symbol = "[ΎΡ▓](bold fg:red)"
vimcmd_symbol = "[ΎΡ┤](bold fg:green)"
vimcmd_replace_one_symbol = "[ΎΡ┤](bold fg:magenta)"
vimcmd_replace_symbol = "[ΎΡ┤](bold fg:magenta)"
vimcmd_visual_symbol = "[ΎΡ┤](bold fg:blue)"

